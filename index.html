<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SPA with Sidebar and Video Platform">
    <title>FLISH FLASH - Video Platform</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">    


</head>
<body>
<body>
    <div class="layout">
        <!-- Menu Toggle Button -->
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                FLISH FLASH
            </div>

            <nav class="menu">
                <a class="menu-item active" data-route="/">
                    <img src="" alt="Home">
                    <span>Home</span>
                </a>

                <a class="menu-item" data-route="/Challenges">
                    <img src="" alt="Challenges">
                    <span>Challenges</span>
                </a>

                <a class="menu-item" data-route="/profile">
                    <img src="" alt="Profile">
                    <span>Profile</span>
                </a>
                <a class="menu-item" data-route="/games">
                    <img src="" alt="Games">
                    <span>Games</span>
                </a>
                <a class="menu-item" data-route="/videos">
                    <img src="" alt="Videos">
                    <span>Videos</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div id="app"></div>
        </main>
    </div>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <!-- Link to external JS -->
    <script src="js/main.js"></script>

</body>
</body>
</html>
