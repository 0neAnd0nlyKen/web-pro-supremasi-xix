<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <!-- <link rel="stylesheet" href="css/challenges.css"> -->
    <style>
        /* Challenges Container */
        .challenges-page {
            height: 100vh;
            /* background: linear-gradient(135deg, #667eea, #764ba2); */
            /* color: white; */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topic-selector {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-left: 50px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
        }

        .topic-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            transition: all 0.2s;
        }

        .topic-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .topic-btn.active {
            background: #F6AE4E;
            border-color: white;
        }

        /* Topic Grid */
        .topic-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            padding: 24px;
            justify-items: center;
            align-items: start;
            overflow-y: auto;
            flex: 1;
        }

        .topic-card {
            width: 100%;
            max-width: 280px;
            background: rgba(255,255,255,0.08);
            /* border: 1px solid rgba(255,255,255,0.18); */
            border: 4px solid #FFAE4E;
            backdrop-filter: blur(10px);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .topic-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            background: rgba(0,0,0,0.15);
        }

        .topic-card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .topic-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .topic-card-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Slides Container */
        .slides-container {
            flex: 1;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        .slide {
            min-height: 100%;
            scroll-snap-align: start;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .slide-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Material Slide */
        .material-card {
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 16px solid #FFAE4E;

        }

        .material-card h2 {
            color: #f6f6f7;
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #c3ce29;
            padding-bottom: 0.5rem;
        }

        .material-card p {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .slide-image {
            border-radius: 10px;

        }
                .slide-image.question {
            max-width: 100%;
            border-radius: 10px;

        }
                .slide-image.answers {
            max-width: 25%;
            border-radius: 10px;

        }

        pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }

        /* Quiz Slide */
        .quiz-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 16px solid #FFAE4E;

        }

        .quiz-question {
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        .quiz-answers {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .chooseAnswer {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            max-height: 50%;
        }

        .chooseAnswer:hover {
            background: rgba(255,255,255,0.1);
            border-color: #F6AE4E;
        }

        .chooseAnswer.correct {
            background: rgba(40, 167, 69, 0.3);
            border-color: #28a745;
            pointer-events: none;
        }

        .chooseAnswer.wrong {
            background: rgba(220, 53, 69, 0.3);
            border-color: #dc3545;
            pointer-events: none;
        }

        /* Explanation Boxes */
        .explanation-box {
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .explanation-box.visible {
            display: block;
        }

        .explanation-box.correct {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
        }

        .explanation-box.wrong {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
        }

        /* External Link Slide */
        .external-card {
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 16px solid #FFAE4E;
            backdrop-filter: blur(10px);

        }

        .external-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #F6AE4E;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .external-link:hover {
            background: #e09d3e;
        }

        /* Textbox and symbol classes */
        .textbox {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }

        .symbol {
            font-size: 48px;
            margin: 20px 0;
            color: #F6AE4E;
        }

        /* Slide Navigation */
        .slide-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
            border-color: #F6AE4E;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .slide-counter {
            color: white;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="topic-selector" id="topicSelector" style="display: none;"></div>
    <div class="challenges-page">
        <div class="topic-list" id="topicList"></div>
        <!-- Topic list -->
        
        <!-- Topic selector -->
        
        <!-- Slides container -->
        <div class="slides-container" id="slidesContainer"></div>
    </div>
</body>
</html>
