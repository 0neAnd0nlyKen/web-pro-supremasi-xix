<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <!-- <link rel="stylesheet" href="css/challenges.css"> -->
    <style>
        /* Challenges Container */
        .challenges-page {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            overflow-y: auto;
        }

        .topic-selector {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-left: 50px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
        }

        .topic-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            transition: all 0.2s;
        }

        .topic-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .topic-btn.active {
            background: #F6AE4E;
            border-color: white;
        }

        /* Slides Container */
        .slides-container {
            height: calc(100% - 80px);
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        .slide {
            min-height: 100%;
            scroll-snap-align: start;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        /* Material Slide */
        .material-card {
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .material-card h2 {
            color: #f6f6f7;
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #c3ce29;
            padding-bottom: 0.5rem;
        }

        .material-card p {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .slide-image {
            border-radius: 10px;

        }
                .slide-image.question {
            max-width: 100%;
            border-radius: 10px;

        }
                .slide-image.answers {
            max-width: 25%;
            border-radius: 10px;

        }

        pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }

        /* Quiz Slide */
        .quiz-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .quiz-question {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        .quiz-answers {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .chooseAnswer {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            max-height: 50%;
        }

        .chooseAnswer:hover {
            background: rgba(255,255,255,0.1);
            border-color: #F6AE4E;
        }

        .chooseAnswer.correct {
            background: rgba(40, 167, 69, 0.3);
            border-color: #28a745;
            pointer-events: none;
        }

        .chooseAnswer.wrong {
            background: rgba(220, 53, 69, 0.3);
            border-color: #dc3545;
            pointer-events: none;
        }

        /* Explanation Boxes */
        .explanation-box {
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .explanation-box.visible {
            display: block;
        }

        .explanation-box.correct {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
        }

        .explanation-box.wrong {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
        }

        /* External Link Slide */
        .external-card {
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .external-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #F6AE4E;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .external-link:hover {
            background: #e09d3e;
        }

        /* Textbox and symbol classes */
        .textbox {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }

        .symbol {
            font-size: 48px;
            margin: 20px 0;
            color: #F6AE4E;
        }    
    </style>
</head>
<body>
    <div class="challenges-page">
        <!-- Topic selector -->
        <div class="topic-selector" id="topicSelector"></div>
        
        <!-- Slides container -->
        <div class="slides-container" id="slidesContainer"></div>
    </div>
</body>
</html>
