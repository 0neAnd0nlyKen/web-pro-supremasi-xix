<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - FLISH FLASH</title>
    <style>
        .history-page {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .likes-history, .comments-history, .challenges-history {
            margin-bottom: 40px;
        }

        .likes-history h2, .comments-history h2, .challenges-history h2 {
            color: white;
            margin-bottom: 20px;
        }

        .likes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .game-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .comment {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
        }

        .comment strong {
            color: #f6f6f7;
        }

        .comment p {
            margin: 10px 0;
        }

        .comment small {
            color: #ccc;
        }

        .challenges-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .challenge {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic {
            font-weight: bold;
            color: white;
        }

        .progress-label {
            color: #f6f6f7;
        }
    </style>
</head>
<body>
    <div class="history-page">
        <div class="likes-history">
            <h2>Liked Games</h2>
            <div class="likes-grid">
                <div class="game-item">
                    <img src="" alt="">
                </div>
            </div>
        </div>
        <div class="comments-history">
            <h2>Comments History</h2>
            <div class="comments-list">
                <div class="comment">
                </div>
            </div>
        </div>
        <div class="challenges-history">
            <h2>Challenges Progress</h2>
            <div class="challenges-list">
            <div class="challenges-list">
                <div class="challenge">
                    <div class="topic"></div>
                    <div class="progress-label"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
