<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - FLISH FLASH</title>
    <style>
        .history-page {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .history-container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            padding: 40px;
            background: rgba(255,255,255,0.15);
            border: 24px solid #FFAE4E;
            border-radius: 45px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            gap: 20px;
        }

        .likes-history, .comments-history, .challenges-history {
            margin-bottom: 40px;
        }

        .likes-history h2, .comments-history h2, .challenges-history h2 {
            color: white;
            margin-bottom: 20px;
        }

        .likes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .game-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .comment {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
        }

        .comment strong {
            color: #f6f6f7;
        }

        .comment p {
            margin: 10px 0;
        }

        .comment small {
            color: #ccc;
        }

        .challenges-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .challenge {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic {
            font-weight: bold;
            color: white;
        }

        .progress-label {
            color: #f6f6f7;
        }

        .level-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            /* background: rgba(255,255,255,0.1); */
            border-radius: 10px;
            padding: 20px;
        }

        .level-icon {
            margin-right: 20px;
        }

        .level-icon img {
            width: 60px;
            height: 60px;
        }

        .progress-bar {
            flex: 1;
        }

        .level-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .level-label-name h3,
        .level-label-percent h3 {
            margin: 0;
            color: white;
        }

        .progress {
            width: 100%;
            height: 20px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #007bff;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="history-page">
        <div class="level-container"> <!-- display: flex -->
            <div class="level-icon">
                <img src="assets/level.png" alt="Level Icon"> <!-- 'assets/level-noob.png' 'assets/level-casual.png' 'assets/level-ranked-pusher.png' 'assets/level-immortal.png' 'assets/level-pro-player.png' -->
            </div>
            <div class="progress-bar">
                <div class="level-label"> <!-- display: flex -->
                    <div class="level-label-name">
                        <h3>NOOB</h3>
                    </div>
                    <div class="level-label-percent">
                        <h3>50%</h3>
                    </div>
                </div>
                <div class="progress"> <!-- div.progress dan div.progress-fill dari bootstrap -->
                    <div class="progress-fill" role="progressbar" ></div>
                </div>
            </div>
        </div>
        <div class="history-container">
            <div class="challenges-history">
                <h2>Challenges Progress</h2>
                <div class="challenges-list">
                <div class="challenges-list">
                    <div class="challenge">
                        <div class="topic"></div>
                        <div class="progress-label"></div>
                    </div>
                </div>
            </div>        
            <div class="likes-history">
                <h2>Liked Games</h2>
                <div class="likes-grid">
                    <div class="game-item">
                        <img src="" alt="">
                    </div>
                </div>
            </div>
            <div class="comments-history">
                <h2>Comments History</h2>
                <div class="comments-list">
                    <div class="comment">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
