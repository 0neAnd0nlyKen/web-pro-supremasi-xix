<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Feed - Ruffle Player</title>
    
    <style>
        .games-feed {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        .game-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }

        .game-container {
            display: flex;
            width: 90%;
            height: 90%;
            gap: 20px;
            padding: 20px;
            border-radius: 30px;
            border: 6px solid #FFAE4E;
            background: rgba(0,0,0,0.6);
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .middle {
            flex: 1.5;
        }

        .left {
            gap: 10px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
        }

        .year {
            font-size: 14px;
            opacity: 0.7;
        }

        .creator-label {
            font-size: 13px;
            opacity: 0.6;
        }

        .description {
            font-size: 15px;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
        }

        .genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .genres span {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .game-player {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
        }

        object, ruffle-player {
            width: 100%;
            height: 350px;
        }

        .act-btn-panel {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .likes-btn, .comments-btn {
            border: none;
            background: #FF4E4E;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .likes-btn:hover,
        .comments-btn:hover {
            transform: scale(1.1);
        }

        .right {
            gap: 12px;
        }

        .screenshots-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .screenshots-row {
            display: flex;
            gap: 8px;
        }

        .screenshot {
            width: 120px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
        }

        .screenshot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comments-list {
            background: #F6504A;
            border-radius: 10px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .comment {
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 13px;
        }

        .challenges-container {
            padding: 15px;
            border-radius: 15px;
            background: linear-gradient(135deg, #FFAE4E, #ff7a18);
            text-align: center;
        }

        .challenges-container a {
            display: inline-block;
            margin-top: 10px;
            background: white;
            color: black;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .game-container:hover {
            transform: scale(1.01);
            transition: 0.3s;
        }
        
    </style>
</head>
<body>
    <div class="games-page">
        <div class="container-fluid">
            <h1 style="color: white; margin-bottom: 30px; font-size: 32px;">🎮 Flash Games</h1>
            <div class="games-feed">
                <div class="game-wrapper">
                    <div class="game-container">
                         <div class="col left">
                            <div class="title"></div>
                            <div class="year"></div>
                            <div class="creator-label">Created by:</div>
                            <div class="description"></div>
                            <div class="genres"></div>
                        </div>
                    
                        <div class="col middle">
                            <div class="game-player">
                                <object 
                                    type="application/x-shockwave-flash" 
                                    data=""  
                                    >
                                    <param name="quality" value="high">
                                    <param name="wmode" value="transparent">
                                    <p>Flash content not supported. 
                                        <a href="https://ruffle.rs" style="color: #F6AE4E;">Get Ruffle</a>
                                    </p>
                                </object>
                            </div>
                            <div class="act-btn-panel">
                                <div>
                                    <button class="likes-btn">❤️</button>
                                    <div class="likes-count">20.2K</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col right">
                            <div class="screenshots-container"> 
                                <div class="screenshots-row">
                                    <div class="screenshot"></div>                                    
                                </div>
                                <div class="screenshots-row">
                                    <div class="screenshot"></div>
                                </div>
                            </div>
                            <div class="comments-list">
                                <div class="comment"></div>
                                <div class="comments-count"></div>
                                <form action="">
                                    <input type="text" placeholder="Write a comment..." />
                                    <button type="submit">Post</button>
                                </form>
                            </div>
                            <div class="challenges-container">
                                <p>Ikuti challenge untuk meningkatkan skill kamu 🚀</p>
                                <a href="/challenges">Join Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</body>
</html>
