<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Feed - Ruffle Player</title>
    

    <style>
        /* Games Feed Scrolling */
        .games-feed {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* Game Wrapper - fills viewport */
        .game-wrapper {
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        /* Game Container - contains game item content */
        .game-container {
            display: flex;
            height: 100%;
            gap: 20px;
            margin-bottom: 30px;
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 24px solid #FFAE4E;
            border-radius: 45px;
            /* backdrop-filter: blur(10px); */
            
        }

        /* Game Player - the game object */
        .game-player {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
            background: #2a2a2a;
        }

        object, ruffle-player {
            width: 100%;
            height: 300px;
            border: none;
        }
        .games-page {
            height: 100vh;
            overflow-y: scroll; /* Enable scrolling on games-page */
            scroll-snap-type: y mandatory; /* Enable snap scrolling */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
            /* 
            height: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2); */
        }

        .col {
            flex: 1;
            justify-content: center;
            align-items: center;
            /* border-radius: 10px; */
        }

        .left, .right {
            /* background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            min-height: 350px; */
        }

        .middle {
            /* background: rgba(0, 0, 0, 0.3);
            min-height: 350px; */
        }


        .comments-list {
            max-height: 50%;
            overflow-y: auto;
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        .title{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        
        .year{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        
        .creator-label{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }

        .description{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
            overflow-y: auto;
        }

        .genres{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        
        .act-btn-panel{
            display: flex;
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        .likes-btn-wrapper{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.6);
        }
        .likes-btn{
            background-color: rgba(255, 255, 255, 0.3);
        }
        .comments-btn-wrapper{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.6);
        }
        .comments-btn{
            background-color: rgba(255, 255, 255, 0.3);
        }
        /* Screenshots Container - Horizontal scroll with 2 rows */
        .screenshots-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            max-height: 200px;
            width: 100%;
            padding: 8px;
            /* background-color: rgba(0, 0, 0, 0.3); */
            border-radius: 8px;
            scrollbar-width: thin;
        }

        /* Row wrapper for screenshots */
        .screenshots-row {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            min-width: min-content;
        }

        /* Individual screenshot */
        .screenshots-container .screenshot {
            flex-shrink: 0;
            width: 120px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.5);
            /* border-radius: 6px; */
            overflow: hidden;
            cursor: pointer;
            /* transition: transform 0.2s; */
            position: relative;
        }

        .screenshots-container .screenshot:hover {
            transform: scale(1.05);
            z-index: 1;
        }

        .comments-list{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        .comment{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.6);;
        }
        .comments-count{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.6);;
        }
        .challenges-container{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.9);;
        }
        .challenge-image{
            padding: 1px;
            background-color: rgba(255, 255, 255, 0.6);;
        }
    </style>
</head>
<body>
    <div class="games-page">
        <div class="container-fluid">
            <h1 style="color: white; margin-bottom: 30px; font-size: 32px;">🎮 Flash Games</h1>
            <div class="games-feed">
                <!-- Template game container -->
                <div class="game-wrapper">
                    <div class="game-container">
                         <!-- Left column -->
                         <div class="col left">
                            <div class="title"></div>
                            <div class="year"></div>
                            <div class="creator-label">Created by:</div>
                            <div class="description"></div>
                            <div class="genres"></div>
                             <!-- Thumbnail and info will be injected here by JS -->
                        </div>
                    
                        <!-- Middle column with Flash/Ruffle player -->
                        <div class="col middle">
                            <div class="game-player">
                                <object 
                                    type="application/x-shockwave-flash" 
                                    data=""  
                                    >
                                    <param name="quality" value="high">
                                    <param name="wmode" value="transparent">
                                    <p>Flash content not supported. 
                                        <a href="https://ruffle.rs" style="color: #F6AE4E;">Get Ruffle</a>
                                    </p>
                                </object>
                            </div>
                            <div class="act-btn-panel">
                                <div class="likes-btn-wrapper">
                                    <button class="likes-btn"></button>
                                    <div class="likes-count"></div>
                                </div>
                                <div class="comments-btn-wrapper">
                                    <button class="comments-btn"></button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Right column -->
                        <div class="col right">
                            <div class="screenshots-container"> <!-- dua barisan foto. scroll kiri kanan -->
                                <div class="screenshots-row">
                                    <div class="screenshot"></div>                                    
                                </div>
                                <div class="screenshots-row">
                                    <div class="screenshot"></div>
                                </div>
                            </div>
                            <div class="comments-list">
                                <div class="comment"></div>
                                <div class="comments-count"></div>
                                <form action="">
                                    <input type="text" placeholder="Write a comment..." />
                                    <button type="submit">Post</button>
                                </form>
                            </div>
                            <div class="challenges-container">
                                <div class="challenge-image"></div>
                                <a href=""></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ruffle CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</body>
</html>
